name: Daily News Digest

# 매일 아침 파이프라인을 실행해 News/YYYY-MM-DD.md 를 생성하고 main에 자동 커밋한다.
on:
  schedule:
    # cron은 UTC 기준. 21:00 UTC = 다음날 06:00 KST(아침 브리핑 시각).
    # 시각을 바꾸려면 이 값을 조정한다(예: 22:00 UTC = 07:00 KST).
    - cron: "0 21 * * *"
  workflow_dispatch: {}  # 수동 실행 버튼(Actions 탭에서 즉시 실행)

# 생성된 다이제스트를 커밋·푸시하기 위해 쓰기 권한이 필요하다.
permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul  # fetch(로컬시간)·curate·summarize의 "오늘"을 KST로 일치시킨다.
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 파이프라인 실행
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: ./run.sh

      # observe-only 객관성 채점. fetch가 방금 만든 오늘 raw로 채점하므로
      # 디제스트와 동일한 스냅샷이며 AI 토큰이 들지 않는다. raw는 보관하지 않고
      # 누적 결과(scores/)만 커밋한다. 수동 실행을 놓쳐도 매일 자동 누적된다.
      - name: 객관성 점수 채점(observe-only)
        run: python3 src/objectivity.py

      - name: 다이제스트·점수 자동 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add News/ failures/ scores/
          # 웹(Vercel) 데이터. web/.gitignore가 data JSON을 (로컬 dev 노이즈 방지로)
          # 무시하므로 CI에서만 -f로 강제 스테이징한다. latest.json 갱신 → main push →
          # Vercel 재빌드 → 웹 자동 갱신. 날짜별 파일도 함께 커밋(향후 네비게이션용).
          git add -f web/public/data/
          if git diff --staged --quiet; then
            echo "변경된 산출물 없음 — 커밋 생략"
          else
            git commit -m "docs: $(date +%F) 다이제스트 자동 생성 + 객관성 점수 축적 + 웹 데이터 갱신"
            git push
          fi

      # 오늘자 다이제스트를 본인 Gmail로 발송(HTML+카톡용 plain 멀티파트).
      # 커밋 뒤 단계라 발송이 실패해도 다이제스트는 이미 저장돼 있으며,
      # 발송 실패는 이 스텝의 빨간불로 노출된다(조용히 넘기지 않는다).
      - name: 이메일 발송
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
        run: python3 src/notify.py
