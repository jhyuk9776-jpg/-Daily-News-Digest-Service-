name: Daily News Digest

# 매일 아침 파이프라인을 실행해 News/YYYY-MM-DD.md 를 생성하고 main에 자동 커밋한다.
on:
  schedule:
    # cron은 UTC 기준. 22:00 UTC = 다음날 07:00 KST(아침 브리핑 시각).
    # 시각을 바꾸려면 이 값을 조정한다(예: 21:00 UTC = 06:00 KST).
    - cron: "0 22 * * *"
  workflow_dispatch: {}  # 수동 실행 버튼(Actions 탭에서 즉시 실행)

# 생성된 다이제스트를 커밋·푸시하기 위해 쓰기 권한이 필요하다.
permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul  # fetch(로컬시간)·curate·summarize의 "오늘"을 KST로 일치시킨다.
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 파이프라인 실행
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: ./run.sh

      - name: 다이제스트 자동 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add News/ failures/
          if git diff --staged --quiet; then
            echo "변경된 다이제스트 없음 — 커밋 생략"
          else
            git commit -m "docs: $(date +%F) 다이제스트 자동 생성"
            git push
          fi
